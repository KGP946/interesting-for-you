<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
            color: white;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
            transition: background-image 1.5s ease-in-out;
            z-index: 1;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 90%;
            max-width: 1200px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .buttons {
            margin-top: 30px;
            position: relative;
            min-height: 100px;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.1);
        }

        #yes {
            background: #ff4b5c;
            color: white;
        }

        #yes:hover {
            background: #ff3333;
        }

        #no {
            background: white;
            color: #ff4b5c;
            position: relative;
            transition: all 0.2s ease;
        }

        #no:hover {
            background: #f0f0f0;
        }

        .counter {
            font-size: 18px;
            margin-top: 10px;
            color: rgba(255,255,255,0.9);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: fadeIn 1.5s ease-in-out;
            border: 3px solid white;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255,255,255,0.8);
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.8); 
            }
            to { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        .heart {
            position: absolute;
            font-size: 24px;
            animation: float 3s linear infinite;
            z-index: 3;
        }

        @keyframes float {
            0% { 
                transform: translateY(0); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(-100px); 
                opacity: 0; 
            }
        }

        .error-message {
            color: #ffcccc;
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="background" id="bg"></div>

<div class="container" id="main">
    <h1>Хочешь ли ты дальше радовать меня своей улыбкой? 💖</h1>
    <div class="buttons">
        <button id="yes">Да ❤️</button>
        <button id="no">Нет 💔</button>
    </div>
    <div class="counter" id="counter">Осталось попыток: 5</div>
</div>

<script>
// ВАШИ 5 ФОТОГРАФИЙ - photo1.jpeg ... photo5.jpeg
const images = [
    "photo1.jpeg",
    "photo2.jpeg",
    "photo3.jpeg",
    "photo4.jpeg",
    "photo5.jpeg"
];

// Для галереи используем те же фото
const galleryImages = [
    "photo1.jpeg",
    "photo2.jpeg",
    "photo3.jpeg",
    "photo4.jpeg",
    "photo5.jpeg"
];

let current = 0;
const bg = document.getElementById("bg");

// Функция смены фона
function changeBackground() {
    bg.style.backgroundImage = `url('${images[current]}')`;
    current = (current + 1) % images.length;
}

// Запускаем смену фона
setInterval(changeBackground, 4000);
changeBackground();

const yesBtn = document.getElementById('yes');
const noBtn = document.getElementById('no');
const main = document.getElementById('main');
const counterDiv = document.getElementById('counter');

let noClickCount = 0; // Счетчик нажатий на кнопку "Нет"
const maxNoClicks = 5; // Максимальное количество попыток

// Функция для проверки загрузки изображений
function checkImage(url) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
    });
}

// Обработка кнопки "Да"
yesBtn.addEventListener('click', async () => {
    // Проверяем, загружаются ли фото
    const imageChecks = await Promise.all(galleryImages.map(url => checkImage(url)));
    const allImagesLoaded = imageChecks.every(result => result === true);
    
    // Создаем HTML для галереи
    let galleryHTML = '';
    galleryImages.forEach((imgUrl, index) => {
        galleryHTML += `<img src="${imgUrl}" alt="Фото ${index + 1}" loading="lazy">`;
    });

    if (!allImagesLoaded) {
        galleryHTML += '<div class="error-message">⚠️ Не все фото найдены! Убедитесь, что файлы photo1.jpeg - photo5.jpeg лежат рядом с этим HTML файлом</div>';
    }

    main.innerHTML = `
        <h1 style="font-size:2.5em; margin-bottom:20px;">С 8 марта, любимая! 🌸💖</h1>
        <p style="font-size:1.3em; margin-bottom:20px;">Вот наши 5 особенных фотографий:</p>
        <div class="gallery">
            ${galleryHTML}
        </div>
        <p style="margin-top:20px; font-size:1.1em;">Ты самая лучшая! ❤️</p>
    `;
});

// Обработка кнопки "Нет" с логикой 5 попыток
noBtn.addEventListener('click', () => {
    noClickCount++;
    
    if (noClickCount >= maxNoClicks) {
        // После 5 нажатий кнопка исчезает
        noBtn.style.display = 'none';
        counterDiv.innerHTML = '🎉 Сдаюсь! Ты победила! Нажимай "Да"! 🎉';
        counterDiv.style.fontSize = '20px';
        counterDiv.style.color = '#ffd700';
    } else {
        // Показываем сколько осталось попыток
        const remaining = maxNoClicks - noClickCount;
        counterDiv.innerHTML = `Осталось попыток нажать "Нет": ${remaining}`;
        
        // Кнопка убегает еще сильнее с каждой попыткой
        const randomX = Math.random() * 300 - 150;
        const randomY = Math.random() * 300 - 150;
        noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        
        // Разные сообщения в зависимости от количества нажатий
        const messages = [
            '😊 Еще 4 попытки...',
            '🤔 Точно нет?',
            '😲 Подумай еще!',
            '😭 Не ломай мне сердце!',
            '💔 Это последний шанс!'
        ];
        
        if (noClickCount <= 5) {
            alert(messages[noClickCount - 1]);
        }
    }
});

// Добавляем эффект "убегания" при наведении (но после 5 раз уже неактуально)
noBtn.addEventListener('mouseover', () => {
    if (noClickCount < maxNoClicks) {
        const randomX = Math.random() * 200 - 100;
        const randomY = Math.random() * 200 - 100;
        noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }
});

noBtn.addEventListener('mouseout', () => {
    if (noClickCount < maxNoClicks) {
        noBtn.style.transform = 'translate(0, 0)';
    }
});

// Добавляем падающие сердечки для атмосферы
function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + '%';
    heart.style.top = '100%';
    heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
    document.body.appendChild(heart);
    
    setTimeout(() => {
        heart.remove();
    }, 3000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
